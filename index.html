<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Amiri",serif;
  background:#0d0d0d;
  color:white;
  overflow:hidden;
}

/* سكرول أفقي */
.slider{
  display:flex;
  width:100vw;
  height:100vh;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}

/* الصفحة */
.page{
  min-width:100vw;
  height:100vh;
  scroll-snap-align:start;
  box-sizing:border-box;
  padding:15px;
  overflow-y:auto;
  border:5px solid gold;
}

/* الهيدر */
.header{
  text-align:center;
  border-bottom:2px solid gold;
  padding-bottom:8px;
  margin-bottom:10px;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.sub{
  font-size:14px;
  color:#ccc;
}

/* الآيات */
.ayah{
  font-size:22px;
  line-height:2.2;
  display:block;
  margin:8px 0;
  text-align:right;
  direction:rtl;
}

.basmala{
  text-align:center;
  color:gold;
  margin:10px 0;
  font-size:20px;
}
</style>

</head>

<body>

<div class="slider" id="slider"></div>

<script>

let surahNumber = 1; // الفاتحة (تقدر تغيرها)
let ayahsPerPage = 8;

fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}`)
.then(res=>res.json())
.then(data=>{

  let surah = data.data;
  let ayahs = surah.ayahs;

  let pages = [];

  // تقسيم الآيات لصفحات
  for(let i=0;i<ayahs.length;i+=ayahsPerPage){
    pages.push(ayahs.slice(i,i+ayahsPerPage));
  }

  buildPages(pages,surah);
});

function buildPages(pages,surah){

  let slider=document.getElementById("slider");

  pages.forEach((page,index)=>{

    let start = page[0].numberInSurah;
    let end = page[page.length-1].numberInSurah;
    let juz = page[0].juz;

    let div=document.createElement("div");
    div.className="page";

    div.innerHTML=`
      <div class="header">
        <div class="title">سورة ${surah.name}</div>
        <div class="sub">
          الجزء: ${juz} | الآيات: ${start} - ${end}
        </div>
      </div>

      <div class="basmala">بسم الله الرحمن الرحيم</div>
    `;

    page.forEach(a=>{
      div.innerHTML+=`<div class="ayah">${a.text}</div>`;
    });

    slider.appendChild(div);
  });
}

</script>

</body>
</html>
