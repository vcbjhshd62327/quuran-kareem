<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف</title>

<style>
body {
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f5f0e6;
    transition:0.3s;
}

/* دارك مود */
body.dark {
    background:#111;
    color:white;
}

/* الهيدر */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:#bfa14a;
    color:white;
    font-weight:bold;
}

/* زر القائمة */
.menu-btn {
    font-size:22px;
    cursor:pointer;
}

/* القائمة الجانبية */
.sidebar {
    position:fixed;
    top:0;
    left:-250px;
    width:250px;
    height:100%;
    background:#222;
    color:white;
    overflow:auto;
    transition:0.3s;
    z-index:999;
}

.sidebar.open {
    left:0;
}

.sidebar div {
    padding:10px;
    border-bottom:1px solid #444;
    cursor:pointer;
}

/* المصحف */
.container {
    position:relative;
    height:85vh;
    overflow:hidden;
}

.book {
    display:flex;
    height:100%;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}

.page {
    min-width:100%;
    padding:20px;
    box-sizing:border-box;
    scroll-snap-align:center;
}

/* الإطار الذهبي */
.page-inner {
    border:3px solid #bfa14a;
    border-radius:20px;
    height:100%;
    padding:15px;
    position:relative;
}

/* رقم الصفحة */
.page-number {
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:#bfa14a;
    color:white;
    padding:5px 12px;
    border-radius:50px;
}

/* البسملة */
.bismillah {
    text-align:center;
    color:#bfa14a;
    margin:10px 0;
}

/* الآيات */
.ayah {
    font-size:18px;
    margin:8px 0;
    line-height:1.8;
}

/* الأسهم */
.arrow {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:25px;
    background:#bfa14a;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.left { left:10px; }
.right { right:10px; }

</style>
</head>

<body>

<!-- القائمة -->
<div class="sidebar" id="sidebar"></div>

<!-- الهيدر -->
<div class="header">
    <div id="surahName">سورة</div>
    <div>
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
    </div>
    <div id="juz">جزء 1</div>
</div>

<!-- المصحف -->
<div class="container">

    <div class="arrow right" onclick="prevPage()">➡</div>
    <div class="arrow left" onclick="nextPage()">⬅</div>

    <div class="book" id="book"></div>

</div>

<script>

// API القرآن
const api = "https://api.alquran.cloud/v1/quran/ar";

// عناصر
const book = document.getElementById("book");
const sidebar = document.getElementById("sidebar");

let pages = [];
let currentPage = 0;

// تحميل القرآن
fetch(api)
.then(res => res.json())
.then(data => {

    const surahs = data.data.surahs;

    // إنشاء قائمة السور
    surahs.forEach((s, index) => {
        let div = document.createElement("div");
        div.innerText = s.name;
        div.onclick = () => goToSurah(index);
        sidebar.appendChild(div);
    });

    // تقسيم لصفحات
    surahs.forEach(surah => {
        for (let i = 0; i < surah.ayahs.length; i += 10) {
            pages.push({
                surah: surah.name,
                juz: surah.ayahs[i].juz,
                ayahs: surah.ayahs.slice(i, i+10)
            });
        }
    });

    renderPages();

});

// عرض الصفحات
function renderPages(){
    book.innerHTML = "";

    pages.forEach((p, index) => {

        let page = document.createElement("div");
        page.className = "page";

        page.innerHTML = `
        <div class="page-inner">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

            ${p.ayahs.map(a => `<div class="ayah">${a.text}</div>`).join("")}

            <div class="page-number">${index+1}</div>
        </div>
        `;

        book.appendChild(page);
    });
}

// التنقل
function nextPage(){
    book.scrollBy({left: window.innerWidth, behavior:'smooth'});
    currentPage++;
}

function prevPage(){
    book.scrollBy({left: -window.innerWidth, behavior:'smooth'});
    currentPage--;
}

// فتح القائمة
function toggleMenu(){
    sidebar.classList.toggle("open");
}

// الذهاب لسورة
function goToSurah(index){
    currentPage = index;
    book.scrollTo({left: index * window.innerWidth, behavior:'smooth'});
    sidebar.classList.remove("open");
}

// دارك مود (دبل كليك)
document.body.ondblclick = () => {
    document.body.classList.toggle("dark");
};

</script>

</body>
</html>
