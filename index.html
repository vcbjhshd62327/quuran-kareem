<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف</title>

<style>
body {
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f5ecd7;
    transition:0.3s;
}

/* Dark Mode */
body.dark {
    background:#111;
    color:white;
}

/* Header */
.top-bar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#c9a646;
    color:white;
    font-weight:bold;
}

/* Sidebar */
.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:200px;
    height:100%;
    background:#222;
    color:white;
    overflow-y:auto;
    padding:10px;
}

.sidebar div {
    padding:8px;
    cursor:pointer;
}

.sidebar div:hover {
    background:#444;
}

/* Content */
.main {
    margin-left:200px;
    padding:20px;
}

/* Frame */
.frame {
    border:5px solid gold;
    border-radius:20px;
    padding:20px;
    position:relative;
}

/* Bismillah */
.bismillah {
    text-align:center;
    color:gold;
    margin:10px 0;
}

/* Ayah */
.ayah {
    font-size:18px;
    margin:10px 0;
}

/* Page Number */
.page-number {
    position:absolute;
    bottom:-15px;
    left:50%;
    transform:translateX(-50%);
    background:gold;
    color:black;
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Controls */
.controls {
    text-align:center;
    margin-top:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="surahList"></div>

<!-- Main -->
<div class="main">

<div class="top-bar">
    <div id="surahName">اسم السورة</div>
    <div id="juzNumber">الجزء 1</div>
</div>

<div class="frame">

<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

<div id="ayahContainer"></div>

<div class="page-number" id="pageNum">1</div>

</div>

<div class="controls">
<button onclick="prevPage()">⬅️ السابق</button>
<button onclick="nextPage()">التالي ➡️</button>
<button onclick="toggleDark()">🌙</button>
</div>

</div>

<script>

// API القرآن
const api = "https://api.alquran.cloud/v1/quran/ar";

let allPages = [];
let currentPage = 0;

// تحميل القرآن
fetch(api)
.then(res => res.json())
.then(data => {

    const surahs = data.data.surahs;

    // إنشاء قائمة السور
    const list = document.getElementById("surahList");

    surahs.forEach((s, index) => {
        let div = document.createElement("div");
        div.innerText = s.name;
        div.onclick = () => goToSurah(index);
        list.appendChild(div);
    });

    // تقسيم لصفحات (10 آيات)
    surahs.forEach(surah => {
        for (let i = 0; i < surah.ayahs.length; i += 10) {
            allPages.push({
                name: surah.name,
                ayahs: surah.ayahs.slice(i, i+10).map(a => a.text),
                juz: surah.ayahs[i].juz
            });
        }
    });

    loadPage(0);
});

// تحميل صفحة
function loadPage(i){
    currentPage = i;

    let page = allPages[i];

    document.getElementById("surahName").innerText = page.name;
    document.getElementById("juzNumber").innerText = "الجزء " + page.juz;

    document.getElementById("ayahContainer").innerHTML =
        page.ayahs.map(a => `<div class="ayah">${a}</div>`).join("");

    document.getElementById("pageNum").innerText = i + 1;

    localStorage.setItem("lastPage", i);
}

// التالي
function nextPage(){
    if(currentPage < allPages.length-1){
        loadPage(currentPage + 1);
    }
}

// السابق
function prevPage(){
    if(currentPage > 0){
        loadPage(currentPage - 1);
    }
}

// اختيار سورة
function goToSurah(index){
    let pageIndex = allPages.findIndex(p => p.name === allPages[index].name);
    loadPage(pageIndex);
}

// Dark Mode
function toggleDark(){
    document.body.classList.toggle("dark");
}

// تحميل آخر صفحة
window.onload = () => {
    let last = localStorage.getItem("lastPage");
    if(last) currentPage = parseInt(last);
};

</script>

</body>
</html>
