<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>القرآن الكريم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Amiri",serif;
  overflow:hidden;
  transition:0.3s;
}

body.dark{background:#0d0d0d;color:#f5f5f5;}
body.light{background:#f5f5f5;color:#111;}

.quran-frame{
  border:10px solid gold;
  border-radius:20px;
  margin:15px;
  padding:10px;
  box-shadow:0 0 20px gold;
}

/* الهيدر */
.header{
  text-align:center;
  border-bottom:2px solid gold;
  padding-bottom:10px;
}

.surah-name{font-size:24px;font-weight:bold;}
.juz{font-size:16px;color:gold;}

/* البسملة */
.basmala{
  text-align:center;
  color:gold;
  font-size:22px;
  margin:10px 0;
}

/* التحكم */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

select,button{
  padding:8px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

/* المصحف */
.quran-container{
  height:65vh;
  overflow:hidden;
  padding:15px;
  direction:rtl;
  perspective:1000px;
}

/* صفحة المصحف */
.page{
  display:none;
  transform:rotateY(90deg);
  transition:0.6s ease;
}

.page.active{
  display:block;
  transform:rotateY(0deg);
}

/* الآيات جنب بعض */
.ayah{
  font-size:22px;
  line-height:2.5;
  display:inline;
}

.ayah-number{
  color:gold;
  margin:0 5px;
  font-size:18px;
}

/* footer */
.footer{
  text-align:center;
  border-top:2px solid gold;
  padding-top:10px;
  margin-top:10px;
  color:gold;
}

</style>
</head>

<body class="dark">

<div class="quran-frame">

  <div class="header">
    <div class="surah-name" id="surahName"></div>
    <div class="juz" id="infoHeader"></div>
  </div>

  <div class="basmala">بسم الله الرحمن الرحيم</div>

  <div class="controls">
    <select id="surahSelect"></select>
    <button onclick="toggleMode()">🌙/☀️</button>
  </div>

  <div class="quran-container" id="quran"></div>

  <div class="footer" id="pageInfo"></div>

</div>

<script>

const surahs=[
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"
];

let currentPage=0;
let ayahsPerPage=5; // 👈 قللنا العدد
let currentAyahs=[];

let select=document.getElementById("surahSelect");

surahs.forEach((s,i)=>{
  let o=document.createElement("option");
  o.value=i+1;
  o.text=(i+1)+" - "+s;
  select.appendChild(o);
});

let last=localStorage.getItem("lastSurah")||1;
let lastPage=localStorage.getItem("lastPage")||0;

select.value=last;

loadSurah(last,true);

select.onchange=()=>{
  loadSurah(select.value,true);
  localStorage.setItem("lastSurah",select.value);
};

// تحميل السورة
function loadSurah(num,resetPage){
  fetch(`https://api.alquran.cloud/v1/surah/${num}`)
  .then(r=>r.json())
  .then(data=>{
    let surah=data.data;

    currentAyahs=surah.ayahs;

    if(resetPage){
      currentPage=parseInt(lastPage)||0;
    }else{
      currentPage=0;
    }

    document.getElementById("surahName").innerText="سورة "+surah.name;

    renderPages();
  });
}

// تقسيم الصفحات
function renderPages(){
  let container=document.getElementById("quran");
  container.innerHTML="";

  let pages=[];

  for(let i=0;i<currentAyahs.length;i+=ayahsPerPage){
    pages.push(currentAyahs.slice(i,i+ayahsPerPage));
  }

  pages.forEach((page,i)=>{
    let div=document.createElement("div");
    div.className="page"+(i===currentPage?" active":"");

    let first=page[0].numberInSurah;
    let last=page[page.length-1].numberInSurah;
    let juz=page[0].juz;

    page.forEach(a=>{
      div.innerHTML+=`
        <span class="ayah">
          ${a.text}
          <span class="ayah-number">(${a.numberInSurah})</span>
        </span>
      `;
    });

    container.appendChild(div);

    if(i===currentPage){
      document.getElementById("infoHeader").innerText="الجزء "+juz;
      document.getElementById("pageInfo").innerText=
      "الآيات "+first+" - "+last+" | صفحة "+(i+1)+"/"+pages.length;
    }
  });

  savePage();
}

// تغيير صفحة
function changePage(dir){
  let pages=document.querySelectorAll(".page");

  pages[currentPage].classList.remove("active");

  currentPage+=dir;

  if(currentPage<0)currentPage=0;
  if(currentPage>=pages.length)currentPage=pages.length-1;

  pages[currentPage].classList.add("active");

  renderPages();
}

// حفظ الصفحة
function savePage(){
  localStorage.setItem("lastPage",currentPage);
}

// swipe (عربي: يسار → يمين = next)
let startX=0;

document.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
},{passive:true});

document.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  let diff=endX-startX;

  if(Math.abs(diff)>60){
    if(diff>0){
      changePage(1); // يمين → التالي
    }else{
      changePage(-1); // شمال → السابق
    }
  }
},{passive:true});

// mode
function toggleMode(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
