<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Amiri", serif;
  background: #0d0d0d;
  color: white;
  overflow: hidden;
}

/* السلايدر */
.slider {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

/* إخفاء السكرول */
.slider::-webkit-scrollbar {
  display: none;
}

/* الصفحة */
.page {
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: start;
  box-sizing: border-box;
  padding: 20px;
  overflow-y: auto;
  border: 5px solid gold;
}

/* الهيدر */
.header {
  text-align: center;
  border-bottom: 2px solid gold;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

/* الآيات */
.ayah {
  font-size: 22px;
  line-height: 2.2;
  display: block;
}

.basmala {
  text-align: center;
  color: gold;
  font-size: 20px;
  margin: 10px 0;
}

/* أزرار التنقل */
.navBtn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: gold;
  color: black;
  border: none;
  padding: 15px;
  font-size: 20px;
  cursor: pointer;
  z-index: 1000;
}

#leftBtn { left: 10px; }
#rightBtn { right: 10px; }

</style>
</head>

<body>

<button class="navBtn" id="leftBtn">◀</button>
<button class="navBtn" id="rightBtn">▶</button>

<div class="slider" id="slider"></div>

<script>

let ayahsAll = [];
const chunkSize = 10; // 👈 عدد الآيات في كل صفحة

fetch("https://api.alquran.cloud/v1/quran/quran-uthmani")
.then(res => res.json())
.then(data => {
  ayahsAll = data.data.ayahs;
  buildPages();
});

function buildPages(){
  let slider = document.getElementById("slider");

  for(let i = 0; i < ayahsAll.length; i += chunkSize){

    let chunk = ayahsAll.slice(i, i + chunkSize);

    let page = document.createElement("div");
    page.className = "page";

    page.innerHTML = `
      <div class="header">صفحة ${Math.floor(i / chunkSize) + 1}</div>
      <div class="basmala">بسم الله الرحمن الرحيم</div>
    `;

    chunk.forEach(a => {
      page.innerHTML += `<div class="ayah">${a.text}</div>`;
    });

    slider.appendChild(page);
  }
}

/* التحكم بالسهم */
const slider = document.getElementById("slider");

document.getElementById("leftBtn").onclick = () => {
  slider.scrollBy({ left: -window.innerWidth, behavior: "smooth" });
};

document.getElementById("rightBtn").onclick = () => {
  slider.scrollBy({ left: window.innerWidth, behavior: "smooth" });
};

</script>

</body>
</html>
